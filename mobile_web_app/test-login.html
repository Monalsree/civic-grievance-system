<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0e1a; color: #f1f5f9; padding: 2rem; }
        .container { max-width: 400px; margin: auto; background: #111827; padding: 2rem; border-radius: 8px; }
        h1 { margin-bottom: 1rem; font-size: 1.5rem; }
        input { display: block; width: 100%; padding: 0.8rem; margin-bottom: 1rem; border: 1px solid #333; background: #1a2236; color: #f1f5f9; border-radius: 4px; }
        button { display: block; width: 100%; padding: 0.8rem; background: #6366f1; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #4f46e5; }
        .output { margin-top: 1rem; padding: 1rem; background: #0a0e1a; border-radius: 4px; font-size: 0.85rem; white-space: pre-wrap; word-break: break-all; font-family: monospace; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Login Test</h1>
        <input type="text" id="username" placeholder="Username" value="admin">
        <input type="password" id="password" placeholder="Password" value="admin123">
        <button onclick="testLogin()">Test Login</button>
        <div class="output" id="output">Test output will appear here...</div>
    </div>

    <script>
        const API = 'http://localhost:5000/api';

        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const output = document.getElementById('output');

            output.innerHTML = '⏳ Attempting login...';

            try {
                console.log('📤 Sending request to:', `${API}/auth/login`);
                console.log('📋 Payload:', { username, password });

                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                console.log('📥 Response status:', res.status);
                const data = await res.json();
                console.log('📥 Response data:', data);

                if (res.ok) {
                    output.innerHTML = `<span class="success">✅ LOGIN SUCCESS!\n\nUser: ${data.user.name}\nRole: ${data.user.role}\n\nFull Response:\n${JSON.stringify(data, null, 2)}</span>`;
                } else {
                    output.innerHTML = `<span class="error">❌ LOGIN FAILED!\n\nStatus: ${res.status}\nError: ${data.error}\n\nFull Response:\n${JSON.stringify(data, null, 2)}</span>`;
                }
            } catch (err) {
                console.error('❌ Error:', err);
                output.innerHTML = `<span class="error">❌ NETWORK ERROR!\n\n${err.message}\n\nMake sure backend is running on http://localhost:5000</span>`;
            }
        }

        // Test login on page load
        window.addEventListener('load', function() {
            document.getElementById('output').innerHTML = '✅ Page loaded successfully!\n\nClick "Test Login" button to test the API connection.';
        });
    </script>
</body>
</html>
